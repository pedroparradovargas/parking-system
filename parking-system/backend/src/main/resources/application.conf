# =============================================================================
# application.conf — configuración HOCON del backend.
# Todas las variables aceptan override por env: ${?VAR_NAME}.
# =============================================================================

ktor {
    deployment {
        port = 8080
        port = ${?PORT}
        host = "0.0.0.0"
        host = ${?HOST}
        shutdownGracePeriod = 5000
    }
    application {
        modules = [com.parking.backend.ApplicationKt.module]
    }
}

# --- Base de datos PostgreSQL ---
database {
    jdbcUrl = "jdbc:postgresql://localhost:5432/parking"
    jdbcUrl = ${?DATABASE_URL}
    username = "parking"
    username = ${?DB_USER}
    password = "parking"
    password = ${?DB_PASSWORD}
    poolMin = 5
    poolMax = 20
    poolMax = ${?DB_POOL_MAX}
    sslMode = "prefer"
    sslMode = ${?DB_SSL_MODE}
    readReplicaUrl = ""
    readReplicaUrl = ${?DATABASE_REPLICA_URL}
    runMigrations = true
    runMigrations = ${?DB_RUN_MIGRATIONS}
}

# --- JWT ---
security {
    jwtSecret = "change-me-in-production-32bytes-minimum-secret-value"
    jwtSecret = ${?JWT_SECRET}
    jwtIssuer = "parking-system"
    jwtIssuer = ${?JWT_ISSUER}
    jwtAudience = "parking-clients"
    jwtAudience = ${?JWT_AUDIENCE}
    accessTokenTtlSeconds = 3600
    refreshTokenTtlSeconds = 2592000        # 30 días
    bcryptCost = 12
    enableHsts = true
    enableHsts = ${?ENABLE_HSTS}
}

# --- AI microservice ---
ai {
    baseUrl = "http://localhost:8000"
    baseUrl = ${?AI_SERVICE_URL}
    timeoutMillis = 5000
    circuitBreakerThreshold = 5
}

# --- WebSocket / Redis (para censo en vivo) ---
realtime {
    redisHost = "localhost"
    redisHost = ${?REDIS_HOST}
    redisPort = 6379
    redisPort = ${?REDIS_PORT}
    redisEnabled = false
    redisEnabled = ${?REDIS_ENABLED}
}

# --- Rate limiting ---
rateLimit {
    globalRequestsPerMinute = 60
    authRequestsPerMinute = 5
}

# --- CORS (orígenes permitidos para el portal admin) ---
cors {
    allowedHosts = ["http://localhost:3000", "https://admin.parking.example.com"]
    allowedHosts = ${?CORS_ALLOWED_HOSTS}
}
