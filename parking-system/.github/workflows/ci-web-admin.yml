name: ci-web-admin

on:
  pull_request:
    paths: ["web-admin/**", ".github/workflows/ci-web-admin.yml"]
  push:
    branches: [main]

jobs:
  web:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: web-admin } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: npm, cache-dependency-path: web-admin/package-lock.json }
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
