apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-admin
spec:
  replicas: 2
  selector: { matchLabels: { app: web-admin } }
  template:
    metadata: { labels: { app: web-admin } }
    spec:
      containers:
        - name: web-admin
          image: ghcr.io/parking/web-admin:latest
          ports: [{ containerPort: 3000 }]
          env:
            - { name: NEXT_PUBLIC_API_URL, value: "https://api.parking.example.com" }
---
apiVersion: v1
kind: Service
metadata:
  name: web-admin
spec:
  selector: { app: web-admin }
  ports: [{ port: 80, targetPort: 3000 }]
