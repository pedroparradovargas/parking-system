apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: parking-ingress
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  tls:
    - hosts: [api.parking.example.com, admin.parking.example.com]
      secretName: parking-tls
  rules:
    - host: api.parking.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend: { service: { name: backend, port: { number: 80 } } }
    - host: admin.parking.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend: { service: { name: web-admin, port: { number: 80 } } }
