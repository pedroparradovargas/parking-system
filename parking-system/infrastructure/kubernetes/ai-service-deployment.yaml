apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
spec:
  replicas: 2
  selector: { matchLabels: { app: ai-service } }
  template:
    metadata: { labels: { app: ai-service } }
    spec:
      containers:
        - name: ai-service
          image: ghcr.io/parking/ai-service:latest
          ports: [{ containerPort: 8000 }]
          readinessProbe: { httpGet: { path: /ready, port: 8000 }, initialDelaySeconds: 15 }
          livenessProbe:  { httpGet: { path: /health, port: 8000 }, periodSeconds: 30 }
          resources:
            requests: { cpu: "500m", memory: "1Gi" }
            limits:   { cpu: "2",    memory: "4Gi" }
---
apiVersion: v1
kind: Service
metadata:
  name: ai-service
spec:
  selector: { app: ai-service }
  ports: [{ port: 8000, targetPort: 8000 }]
