# =============================================================================
# docker-compose.yml — stack completo para desarrollo local.
# Levanta postgres+timescale, redis, backend Ktor, ai-service Python,
# web-admin Next.js, prometheus y grafana.
# =============================================================================
services:

  postgres:
    image: timescale/timescaledb:2.16.1-pg16
    environment:
      POSTGRES_DB: parking
      POSTGRES_USER: parking
      POSTGRES_PASSWORD: parking
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U parking -d parking"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s

  backend:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.backend
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/parking
      DB_USER: parking
      DB_PASSWORD: parking
      DB_SSL_MODE: disable
      AI_SERVICE_URL: http://ai-service:8000
      REDIS_HOST: redis
      REDIS_ENABLED: "true"
      JWT_SECRET: change-me-in-production-32bytes-minimum-secret-value
      CORS_ALLOWED_HOSTS: '["http://localhost:3000"]'
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  ai-service:
    build:
      context: ../../ai-service
      dockerfile: ../infrastructure/docker/Dockerfile.ai
    ports:
      - "8000:8000"
    environment:
      LOG_LEVEL: INFO

  web-admin:
    build:
      context: ../../web-admin
      dockerfile: ../infrastructure/docker/Dockerfile.web
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
    depends_on:
      - backend

  prometheus:
    image: prom/prometheus:v3.0.0
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:11.3.0
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    depends_on:
      - prometheus

volumes:
  pgdata:
