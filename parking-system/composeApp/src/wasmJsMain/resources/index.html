<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0F3D5C" />
    <link rel="manifest" href="manifest.json" />
    <title>Parking System</title>
    <style>
        /* Reset para que Compose ocupe exactamente la ventana sin overflow del body. */
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
        }
        #root {
            height: 100%;
            width: 100%;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="application/javascript" src="composeApp.js"></script>
</body>
</html>
